<!DOCTYPE html>
<html lang="enn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline Dashboard</timĽň
    <link rel="stylesheet" href="pipeline_dashboard.css">
</head>
<body>
    <header>
        <h1>3D Body Pipeline Dashboard</h1>
        <div id="customer-select">
            Customer ID: <input type="number" id="customer-id" value="1" min="1">
            <button id="generate-btn">Generate New Model</button>
            <button id="refresh-btn">Refresh</button>
        </div>
    </header>
    <main>
        <section id="pipeline-status">
            <h2>Pipeline Components</h2>
            <div id="components-grid"></div>
        </section>
        <section id="model-history">
            <h2>Model History</h2>
            <table id="history-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Date</th>
                        <th>Vertices</th>
                        <th>Texture</th>
                        <th>Shape</th>
                        <th>Depth</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </section>
        <section id="quick-compare">
            <h2>Quick Compare</h2>
            <div>
                <label>Left: <select id="compare-left"></select></label>
                <label>Right: <select id="compare-right"></select></label>
                <button id="compare-btn">Compare</button>
            </div>
        </section>
    </main>
    <div id="toast" class="hidden"></div>
    <script src="pipeline_dashboard.js"></script>
</body>
</html>
