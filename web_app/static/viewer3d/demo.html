<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTD3D — Demo</title>
  <style>
    body { margin: 0; background: #1a1a2e; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
    h2 { color: #94a3b8; font-size: 1.1rem; font-weight: normal; text-align: center; }
  </style>
</head>
<body>
  <h2>Loading…</h2>
  <script>
    const SERVER = location.origin + '/web_app';
    fetch(SERVER + '/api/customer/1/meshes')
      .then(r => r.json())
      .then(data => {
        const meshes = data.meshes || [];
        if (meshes.length > 0) {
          const latest = meshes[0];
          location.href = `index.html?model=/web_app/api/mesh/${latest.id}.glb&customer=1`;
        } else {
          document.querySelector('h2').textContent = 'No meshes yet. Run: python scripts/seed_demo.py';
        }
      })
      .catch(() => {
        // Server not running — fall back to static demo.glb
        location.href = 'index.html?model=demo.glb';
      });
  </script>
</body>
</html>
