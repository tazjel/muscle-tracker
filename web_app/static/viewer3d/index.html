<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Muscle Tracker — 3D Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="ui-overlay">
    <div class="card">
      <h2>3D Muscle Model</h2>
      <div id="mesh-info">Loading model…</div>

      <!-- View-mode toggle -->
      <div class="view-modes">
        <button class="view-mode-btn active" id="btn-solid"
                onclick="setViewMode('solid')">Solid</button>
        <button class="view-mode-btn" id="btn-wireframe"
                onclick="setViewMode('wireframe')">Wire</button>
        <button class="view-mode-btn" id="btn-heatmap"
                onclick="setViewMode('heatmap')">Heat</button>
        <button class="view-mode-btn" id="btn-textured"
                onclick="setViewMode('textured')">Textured</button>
        <button class="view-mode-btn" id="btn-labels"
                onclick="toggleLabels()">Labels</button>
      </div>

      <!-- V7: Room controls -->
      <div class="view-modes" style="margin-top:4px;">
        <button class="view-mode-btn" id="btn-walk"
                onclick="toggleWalkMode()">Walk</button>
        <button class="view-mode-btn" id="btn-room"
                onclick="toggleRoom()">Room</button>
        <button class="view-mode-btn" id="btn-mirror"
                onclick="toggleMirror()">Mirror</button>
        <button class="view-mode-btn" id="btn-props"
                onclick="toggleProps()">Props</button>
        <button class="view-mode-btn" id="btn-stats"
                onclick="toggleBodyStats()">Stats</button>
        <button class="view-mode-btn" id="btn-spin"
                onclick="toggleAutoRotate()">Spin</button>
      </div>

      <!-- Body stats -->
      <div id="body-stats-panel" style="display:none;margin-top:10px;border-top:1px solid #444;padding-top:8px;">
        <h3 style="margin:0 0 6px;font-size:13px;">Body Measurements</h3>
        <div id="body-stats-content" style="font-size:11px;line-height:1.8;"></div>
      </div>

      <!-- Body region adjustment panel (shown on click) -->
      <div id="adjust-panel" style="display:none;margin-top:10px;border-top:1px solid #444;padding-top:8px;">
        <h3 id="adjust-region" style="margin:0 0 6px;font-size:13px;">Region</h3>
        <label style="display:block;font-size:11px;margin-bottom:4px;">
          Width&nbsp;<input type="range" id="adj-width" min="-30" max="30" value="0" style="width:90px;">
          <span id="adj-width-val">0</span>mm
        </label>
        <label style="display:block;font-size:11px;margin-bottom:4px;">
          Depth&nbsp;<input type="range" id="adj-depth" min="-30" max="30" value="0" style="width:90px;">
          <span id="adj-depth-val">0</span>mm
        </label>
        <label style="display:block;font-size:11px;margin-bottom:6px;">
          Length&nbsp;<input type="range" id="adj-length" min="-30" max="30" value="0" style="width:90px;">
          <span id="adj-length-val">0</span>mm
        </label>
        <button onclick="applyAdjustment()" style="font-size:11px;margin-right:4px;">Apply</button>
        <button onclick="resetAdjustment()" style="font-size:11px;margin-right:4px;">Reset</button>
        <button onclick="saveAdjustments()" style="font-size:11px;">Save to Profile</button>
      </div>

      <!-- Mesh comparison -->
      <div id="compare-panel" class="collapsible collapsed" style="margin-top:10px;border-top:1px solid #444;padding-top:8px;">
        <h3 style="margin:0 0 6px;font-size:13px;">Compare Growth</h3>
        <label style="font-size:11px;display:block;margin-bottom:4px;">
          Before: <select id="compare-old" style="width:130px;font-size:11px;background:#1e2035;color:#e2e4f0;border:1px solid #444;border-radius:3px;"></select>
        </label>
        <label style="font-size:11px;display:block;margin-bottom:6px;">
          After: <select id="compare-new" style="width:130px;font-size:11px;background:#1e2035;color:#e2e4f0;border:1px solid #444;border-radius:3px;"></select>
        </label>
        <button onclick="runComparison()" style="font-size:11px;margin-right:4px;">Compare</button>
        <button onclick="loadGhost()" style="font-size:11px;margin-right:4px;">Ghost</button>
        <button onclick="clearComparison(); clearGhost()" style="font-size:11px;">Clear</button>
        <div id="compare-stats" style="font-size:11px;margin-top:4px;color:#00b4cc;display:none;"></div>
      </div>

      <!-- Scan timeline -->
      <div id="timeline-panel" class="collapsible collapsed" style="margin-top:10px;border-top:1px solid #444;padding-top:8px;">
        <h3 style="margin:0 0 6px;font-size:13px;">Scan Timeline</h3>
        <label style="font-size:11px;display:block;">
          <input type="range" id="timeline-slider" min="0" max="0" value="0" style="width:140px;"
                 oninput="switchMesh(this.value)">
        </label>
        <div id="timeline-date" style="font-size:11px;color:#94a3b8;margin-top:2px;"></div>
      </div>

      <!-- Cross-section tool -->
      <div id="section-panel" class="collapsible collapsed" style="margin-top:10px;border-top:1px solid #444;padding-top:8px;">
        <h3 style="margin:0 0 6px;font-size:13px;">Cross Section</h3>
        <label style="font-size:11px;display:block;">
          Height:&nbsp;<input type="range" id="section-height" min="0" max="100" value="50" style="width:100px;">
          <span id="section-height-val">50</span>%
        </label>
        <div id="section-stats" style="font-size:11px;margin-top:4px;color:#aaa;"></div>
      </div>

      <div class="controls">
        <button onclick="resetCamera()">Reset Camera</button>
        <button id="btn-measure" onclick="toggleMeasure()">Measure</button>
        <button onclick="takeScreenshot()">Screenshot</button>
        <button onclick="clearMeasurements()">Clear Pins</button>
      </div>

      <div style="font-size:9px;color:#555;margin-top:6px;">
        Keys: 1-4 views · 5 walk · 6 room · 7 mirror · 8 props<br>
        9 stats · 0 spin · F full · L labels · M measure · R reset
      </div>

      <div class="stats">
        Vertices: <span id="v-count">0</span><br>
        Faces: <span id="f-count">0</span><br>
        Volume: <span id="vol-val">—</span> cm³
      </div>
    </div>
  </div>

  <!-- Heatmap legend (shown only in heatmap mode) -->
  <div class="heatmap-legend">
    <h3>MUSCLE ACTIVATION</h3>
    <div class="heatmap-gradient"></div>
    <div class="heatmap-labels">
      <span>Low</span><span>Mid</span><span>High</span>
    </div>
  </div>

  <!-- Hover tooltip -->
  <div id="hover-tooltip" style="position:fixed;display:none;background:rgba(0,0,0,0.8);color:#e0e0e0;padding:4px 10px;border-radius:4px;font-size:12px;pointer-events:none;z-index:100;border:1px solid #4a9eff;white-space:nowrap;"></div>

  <!-- Canvas -->
  <div id="canvas-container"></div>

  <!-- MeasurementOverlay (plain script, must load before module) -->
  <script src="measurement_overlay.js"></script>

  <!-- 3D Viewer (ES module) -->
  <script type="module" src="body_viewer.js"></script>

  <!-- Wire overlay to viewer after both are loaded -->
  <script type="module">
    // body_viewer.js exposes window.bodyViewer in init() (synchronous).
    // Model loading is async, but overlay can be initialised immediately —
    // getMeshIntersection() already guards against a null bodyMesh.
    window.addEventListener('load', () => {
      const container = document.getElementById('canvas-container');
      if (container && window.MeasurementOverlay) {
        window.MeasurementOverlay.init(container);
      }
    });
  </script>
</body>
</html>
