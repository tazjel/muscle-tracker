<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Body Progress Report</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1729; color: #e0e0e0; padding: 20px; }
    .report { max-width: 800px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #4a9eff; padding-bottom: 15px; }
    .header h1 { color: #4a9eff; font-size: 1.5rem; margin-bottom: 4px; }
    .header .subtitle { color: #94a3b8; font-size: 0.85rem; }
    .section { background: rgba(22, 33, 62, 0.8); border-radius: 8px; padding: 16px; margin-bottom: 16px; border: 1px solid rgba(74, 158, 255, 0.2); }
    .section h2 { color: #4a9eff; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .stat-card { background: rgba(74, 158, 255, 0.08); padding: 10px; border-radius: 6px; text-align: center; }
    .stat-card .value { font-size: 1.3rem; font-weight: bold; color: #fff; }
    .stat-card .label { font-size: 0.7rem; color: #94a3b8; margin-top: 2px; }
    .timeline-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-item .date { color: #94a3b8; }
    .timeline-item .vol { color: #4a9eff; font-weight: bold; }
    canvas { width: 100%; height: 200px; border-radius: 6px; background: rgba(0,0,0,0.2); display: block; }
    .no-data { color: #666; text-align: center; padding: 20px; font-style: italic; }
    .btn { display: inline-block; padding: 8px 16px; background: #4a9eff; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; margin: 4px; }
    .btn:hover { background: #3b82f6; }
    .actions { text-align: center; margin: 20px 0; }
    @media print {
      body { background: white; color: #333; padding: 10px; }
      .section { border-color: #ccc; background: #f9f9f9; }
      .header h1, .section h2 { color: #333; }
      .stat-card .value { color: #000; }
      .stat-card { background: #eee; }
      .timeline-item .vol { color: #333; }
      .actions { display: none; }
    }
  </style>
</head>
<body>
  <div class="report">
    <div class="header">
      <h1>Body Progress Report</h1>
      <div class="subtitle" id="report-subtitle">Loading…</div>
    </div>
    <div class="section">
      <h2>Body Profile</h2>
      <div class="grid" id="profile-grid"></div>
    </div>
    <div class="section">
      <h2>Circumferences</h2>
      <div class="grid" id="circ-grid"></div>
    </div>
    <div class="section">
      <h2>Volume Trend</h2>
      <canvas id="trend-canvas"></canvas>
    </div>
    <div class="section">
      <h2>Scan Timeline</h2>
      <div id="timeline-list"></div>
    </div>
    <div class="actions">
      <button class="btn" onclick="window.print()">Print Report</button>
      <button class="btn" onclick="location.href='index.html?customer='+cid">Open Viewer</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const cid = params.get('customer') || '1';
    const SERVER = location.origin + '/web_app';

    async function getToken() {
      const r = await fetch(SERVER + '/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: 'demo@muscle.com', password: 'demo123' }),
      });
      return (await r.json()).token;
    }

    function statCard(label, value) {
      return `<div class="stat-card"><div class="value">${value}</div><div class="label">${label}</div></div>`;
    }

    async function loadReport() {
      try {
        const token = await getToken();
        const r = await fetch(`${SERVER}/api/customer/${cid}/progress_report`, {
          headers: { 'Authorization': 'Bearer ' + token },
        });
        const d = await r.json();
        if (d.status !== 'success') throw new Error(d.message);

        const name = d.profile.name || 'Customer ' + cid;
        const gender = d.profile.gender || '';
        document.getElementById('report-subtitle').textContent =
          `${name}${gender ? ' · ' + gender : ''} · ${d.total_scans} scans · Generated ${new Date().toLocaleDateString()}`;

        // Profile grid
        const pg = document.getElementById('profile-grid');
        const p = d.profile;
        const items = [];
        if (p.height_cm) items.push(statCard('Height', p.height_cm + ' cm'));
        if (p.weight_kg) items.push(statCard('Weight', p.weight_kg + ' kg'));
        if (d.total_scans) items.push(statCard('Total Scans', d.total_scans));
        if (d.meshes.length && d.meshes[0].volume_cm3)
          items.push(statCard('Latest Volume', d.meshes[0].volume_cm3 + ' cm³'));
        pg.innerHTML = items.join('') || '<div class="no-data">No profile data</div>';

        // Circumferences
        const cg = document.getElementById('circ-grid');
        const circs = d.circumferences || {};
        const circItems = Object.entries(circs).map(([k, v]) =>
          statCard(k.charAt(0).toUpperCase() + k.slice(1), v + ' cm'));
        cg.innerHTML = circItems.join('') || '<div class="no-data">No circumference data</div>';

        // Timeline
        const tl = document.getElementById('timeline-list');
        if (d.meshes.length) {
          tl.innerHTML = d.meshes.map((m, i) =>
            `<div class="timeline-item">
              <span>#${m.id}${i === 0 ? ' (latest)' : ''}</span>
              <span class="date">${m.date}</span>
              <span class="vol">${m.volume_cm3 ? m.volume_cm3 + ' cm³' : '—'}</span>
            </div>`
          ).join('');
        } else {
          tl.innerHTML = '<div class="no-data">No scans yet</div>';
        }

        drawTrendChart(d.volume_trend);
      } catch (e) {
        document.getElementById('report-subtitle').textContent = 'Error: ' + e.message;
      }
    }

    function drawTrendChart(data) {
      const canvas = document.getElementById('trend-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = canvas.offsetWidth * 2;
      canvas.height = 400;
      const w = canvas.width, h = canvas.height;
      const pad = { top: 30, right: 20, bottom: 40, left: 60 };

      if (!data || data.length < 2) {
        ctx.fillStyle = '#666';
        ctx.font = '24px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Need 2+ scans for trend', w / 2, h / 2);
        return;
      }

      const vols = data.map(d => d.volume);
      const minV = Math.min(...vols) * 0.98;
      const maxV = Math.max(...vols) * 1.02;
      const rangeV = maxV - minV || 1;
      const plotW = w - pad.left - pad.right;
      const plotH = h - pad.top - pad.bottom;

      ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad.left, pad.top);
      ctx.lineTo(pad.left, h - pad.bottom);
      ctx.lineTo(w - pad.right, h - pad.bottom);
      ctx.stroke();

      ctx.strokeStyle = '#4a9eff'; ctx.lineWidth = 3;
      ctx.beginPath();
      data.forEach((d, i) => {
        const x = pad.left + (i / (data.length - 1)) * plotW;
        const y = h - pad.bottom - ((d.volume - minV) / rangeV) * plotH;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();

      ctx.fillStyle = '#4a9eff';
      data.forEach((d, i) => {
        const x = pad.left + (i / (data.length - 1)) * plotW;
        const y = h - pad.bottom - ((d.volume - minV) / rangeV) * plotH;
        ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.fill();
      });

      ctx.fillStyle = '#94a3b8'; ctx.font = '18px sans-serif'; ctx.textAlign = 'center';
      data.forEach((d, i) => {
        const x = pad.left + (i / (data.length - 1)) * plotW;
        ctx.fillText(d.date.slice(5, 10), x, h - 8);
      });
      ctx.textAlign = 'right';
      ctx.fillText(Math.round(minV) + '', pad.left - 8, h - pad.bottom);
      ctx.fillText(Math.round(maxV) + '', pad.left - 8, pad.top + 14);
    }

    loadReport();
  </script>
</body>
</html>
