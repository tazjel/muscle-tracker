<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Comparison</title>
    <link rel="stylesheet" href="comparison.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="comparison-container">
        <div id="left-panel" class="panel">
            <div class="panel-label" id="left-label">Before</div>
            <canvas id="left-canvas"></canvas>
            <div class="panel-info" id="left-info"></div>
        </div>
        <div id="divider"></div>
        <div id="right-panel" class="panel">
            <div class="panel-label" id="right-label">After</div>
            <canvas id="right-canvas"></canvas>
            <div class="panel-info" id="right-info"></div>
        </div>
    </div>
    <div id="controls">
        <button id="sync-btn" class="active">Sync Cameras</button>
        <button id="wireframe-btn">Wireframe</button>
        <button id="heatmap-btn">Heatmap</button>
        <button id="rotate-btn">Auto-Rotate</button>
        <div id="status"></div>
    </div>
    <script type="module" src="comparison_viewer.js"></script>
</body>
</html>
