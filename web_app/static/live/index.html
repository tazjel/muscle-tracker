<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muscle Tracker — Live Camera</title>
  <link rel="stylesheet" href="live.css">
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">MT</div>
    <div>
      <h1>Live Measure</h1>
      <p id="status-label">Ready — point camera at muscle</p>
    </div>
  </div>
  <div class="header-right">
    <select id="muscle-select">
      <option value="bicep">Biceps</option>
      <option value="tricep">Triceps</option>
      <option value="quadricep">Quads</option>
      <option value="hamstring">Hamstrings</option>
      <option value="calf">Calves</option>
      <option value="deltoid">Deltoids</option>
      <option value="chest">Chest</option>
      <option value="lat">Lats</option>
    </select>
    <a href="../personal/index.html" class="btn btn-outline">Dashboard</a>
  </div>
</header>

<main class="live-main">

  <!-- Camera + overlay -->
  <div class="camera-container">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay-canvas"></canvas>
    <div id="crosshair"></div>

    <!-- Floating metric badges -->
    <div class="badge-group" id="badges">
      <div class="metric-badge" id="badge-circ">
        <span class="badge-val" id="val-circ">––</span>
        <span class="badge-lbl">Circumference</span>
      </div>
      <div class="metric-badge" id="badge-width">
        <span class="badge-val" id="val-width">––</span>
        <span class="badge-lbl">Width</span>
      </div>
      <div class="metric-badge" id="badge-area">
        <span class="badge-val" id="val-area">––</span>
        <span class="badge-lbl">Area</span>
      </div>
    </div>

    <!-- Scanning indicator -->
    <div id="scan-indicator" class="scan-indicator hidden">
      <div class="scan-ring"></div>
      <span>Analyzing…</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-bar">
    <button id="btn-start" class="btn btn-primary btn-lg" onclick="startCamera()">Start Camera</button>
    <button id="btn-pause" class="btn btn-outline btn-lg hidden" onclick="togglePause()">Pause</button>
    <button id="btn-lock"  class="btn btn-gold  btn-lg hidden" onclick="lockAndSave()">Lock &amp; Save Scan</button>
    <button id="btn-flip"  class="btn btn-outline" onclick="flipCamera()" title="Switch front/rear camera">⇄</button>
  </div>

  <!-- Locked frame panel -->
  <div id="locked-panel" class="locked-panel hidden">
    <h2>Frame Locked</h2>
    <div class="locked-grid">
      <canvas id="locked-canvas" width="320" height="240"></canvas>
      <div class="locked-metrics" id="locked-metrics"></div>
    </div>
    <div class="locked-actions">
      <button class="btn btn-primary" onclick="downloadLocked()">Download Image</button>
      <button class="btn btn-outline" onclick="dismissLocked()">Resume Live</button>
    </div>
  </div>

</main>

<!-- Hidden capture canvas -->
<canvas id="capture-canvas" style="display:none"></canvas>

<script src="live.js"></script>
</body>
</html>
